<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo | Food Store</title>
  <link rel="stylesheet" href="../../../css/home_store.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <header>
    <div class="logo">🍕 Food<b>Store</b></div>
    <nav id="nav-menu">
      <span id="navUserName"></span>
      <a href="../home/home.html">Catálogo</a>
      <a href="../../client/orders/orders.html">Mis Pedidos</a>
      <a href="../cart/cart.html" id="cartLink">
        Carrito <span id="cart-count" style="display:none;">0</span>
      </a>
      <a id="adminLink" href="../../admin/adminHome/adminHome.html" style="display:none;">Admin</a>
      <button id="logoutButton">Cerrar sesión</button>
    </nav>
  </header>

  <div class="main-layout">
    <aside class="sidebar">
      <h4>CATEGORÍAS</h4>
      <ul class="category-list" id="category-list">
        <li class="category-item active" data-id="0">Todos los productos</li>
      </ul>
    </aside>

    <main class="content-area">
      <div style="display:flex;gap:12px;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;">
        <input type="text" id="search-input" class="search-bar"
          style="margin-bottom:0;flex:1;min-width:180px;" placeholder="Buscar productos..." />
        <select id="sort-select" style="padding:12px 10px;border-radius:20px;border:1px solid #ddd;font-size:.95rem;">
          <option value="">Ordenar por</option>
          <option value="az">Nombre A → Z</option>
          <option value="za">Nombre Z → A</option>
          <option value="asc">Mayor Precio ↑</option>
          <option value="desc">Menor Precio ↓</option>
        </select>
      </div>

      <h3 id="section-title" style="margin:0 0 1rem;">Todos los Productos</h3>
      <p id="product-count" style="color:#888;font-size:.85rem;margin:-8px 0 16px;"></p>

      <div class="product-grid" id="product-grid">
        <p>Cargando productos...</p>
      </div>
    </main>
  </div>

  <footer class="footer montserrat">
    <div class="footer-company">© 2026 Food Store. Todos los derechos reservados</div>
  </footer>

  <script type="module" src="./home.ts"></script>
</body>
</html>
