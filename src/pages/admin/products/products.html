<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Productos | Food Store Admin</title>
  <link rel="stylesheet" href="../../../css/home_store.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../../css/products.css" />
  <link rel="stylesheet" href="../../../css/sidebarAdminHome.css"/>
</head>
<body>
  <header>
    <div class="logo">🍕 Food<b>Store</b></div>
    <nav>
      <a href="../../store/home/home.html">Ver Tienda</a>
      <button id="logoutButton">Cerrar sesión</button>
    </nav>
  </header>

  <div class="admin-layout">
    <aside class="sidebar-admin">
      <a href="../adminHome/adminHome.html"><span class="icon">📊</span> Dashboard</a>
      <a href="../categories/categories.html"><span class="icon">🗂</span> Categorías</a>
      <a href="./products.html" class="active"><span class="icon">🍔</span> Productos</a>
      <a href="../orders/orders.html"><span class="icon">📦</span> Pedidos</a>
      <a href="../../store/home/home.html"><span class="icon">🛒</span> Ver Tienda</a>
    </aside>

    <main class="admin-content">
      <div class="page-header">
        <h2 style="margin:0;">Gestión de Productos</h2>
        <button class="btn-primary" id="btnNuevo">+ Nuevo Producto</button>
      </div>

      <table id="prodTable">
        <thead>
          <tr>
            <th>ID</th><th>Imagen</th><th>Nombre</th><th>Descripción</th>
            <th>Precio</th><th>Categoría</th><th>Stock</th><th>Estado</th><th>Acciones</th>
          </tr>
        </thead>
        <tbody id="prodBody">
          <tr><td colspan="9" style="color:#aaa;">Cargando...</td></tr>
        </tbody>
      </table>
    </main>
  </div>

  <!-- Modal crear/editar -->
  <div class="overlay" id="modalOverlay">
    <div class="modal">
      <h3 id="modalTitle">Nuevo Producto</h3>
      <input type="hidden" id="editId" />

      <div class="form-group">
        <label>Nombre *</label>
        <input type="text" id="inputNombre" placeholder="Nombre del producto" />
      </div>
      <div class="form-group">
        <label>Descripción</label>
        <textarea id="inputDesc" placeholder="Descripción breve..."></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Precio * (mayor a 0)</label>
          <input type="number" id="inputPrecio" min="1" step="0.01" placeholder="0.00" />
        </div>
        <div class="form-group">
          <label>Stock * (≥ 0)</label>
          <input type="number" id="inputStock" min="0" step="1" placeholder="0" />
        </div>
      </div>
      <div class="form-group">
        <label>Categoría *</label>
        <select id="inputCategoria"></select>
      </div>
      <div class="form-group">
        <label>URL de imagen</label>
        <input type="text" id="inputImg" placeholder="https://..." />
      </div>
      <div class="form-group">
        <div class="check-row">
          <input type="checkbox" id="inputDisponible" checked />
          <label for="inputDisponible" style="margin:0;">Producto disponible</label>
        </div>
      </div>

      <p id="formError" style="color:#e53e3e;font-size:.83rem;display:none;margin:0 0 8px;"></p>

      <div class="modal-footer">
        <button class="btn-cancel" id="btnCancelar">Cancelar</button>
        <button class="btn-primary" id="btnGuardar">Guardar</button>
      </div>
    </div>
  </div>

  <script type="module" src="./products.ts"></script>
</body>
</html>
