<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedidos | Food Store Admin</title>
  <link rel="stylesheet" href="../../../css/home_store.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../../css/sidebarAdminHome.css"/>
  <link rel="stylesheet" href="../../../css/orders.css"/>
</head>
<body>
  <header>
    <div class="logo">🍕 Food<b>Store</b></div>
    <nav>
      <a href="../../store/home/home.html">Ver Tienda</a>
      <button id="logoutButton">Cerrar sesión</button>
    </nav>
  </header>

  <div class="admin-layout">
    <aside class="sidebar-admin">
      <a href="../adminHome/adminHome.html"><span class="icon">📊</span> Dashboard</a>
      <a href="../categories/categories.html"><span class="icon">🗂</span> Categorías</a>
      <a href="../products/products.html"><span class="icon">🍔</span> Productos</a>
      <a href="./orders.html" class="active"><span class="icon">📦</span> Pedidos</a>
      <a href="../../store/home/home.html"><span class="icon">🛒</span> Ver Tienda</a>
    </aside>

    <main class="admin-content">
      <div class="page-header">
        <h2 style="margin:0;">Gestión de Pedidos</h2>
        <select id="filterEstado" style="padding:9px 14px;border:1px solid #ddd;border-radius:8px;font-size:.9rem;">
          <option value="">Todos los pedidos</option>
          <option value="PENDIENTE">Pendiente</option>
          <option value="CONFIRMADO">Confirmado</option>
          <option value="TERMINADO">Terminado</option>
          <option value="CANCELADO">Cancelado</option>
        </select>
      </div>

      <table>
        <thead>
          <tr>
            <th>Pedido</th><th>Cliente</th><th>Fecha</th>
            <th>Estado</th><th>Productos</th><th>Total</th>
          </tr>
        </thead>
        <tbody id="ordersBody">
          <tr><td colspan="6" style="color:#aaa;">Cargando...</td></tr>
        </tbody>
      </table>
    </main>
  </div>

  <!-- Modal detalle -->
  <div class="overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Detalle del Pedido</h3>
        <button class="btn-close" id="btnClose">✕</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <script type="module" src="./orders.ts"></script>
</body>
</html>
