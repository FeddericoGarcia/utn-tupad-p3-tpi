<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Categorías | Food Store Admin</title>
  <link rel="stylesheet" href="../../../css/home_store.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../../css/sidebarAdminHome.css"/>
  <link rel="stylesheet" href="../../../css/categories.css"/>
</head>
<body>
  <header>
    <div class="logo">🍕 Food<b>Store</b></div>
    <nav>
      <a href="../../store/home/home.html">Ver Tienda</a>
      <button id="logoutButton">Cerrar sesión</button>
    </nav>
  </header>

  <div class="admin-layout">
    <aside class="sidebar-admin">
      <a href="../adminHome/adminHome.html"><span class="icon">📊</span> Dashboard</a>
      <a href="./categories.html" class="active"><span class="icon">🗂</span> Categorías</a>
      <a href="../products/products.html"><span class="icon">🍔</span> Productos</a>
      <a href="../orders/orders.html"><span class="icon">📦</span> Pedidos</a>
      <a href="../../store/home/home.html"><span class="icon">🛒</span> Ver Tienda</a>
    </aside>

    <main class="admin-content">
      <div class="page-header">
        <h2>Gestión de Categorías</h2>
        <button class="btn-primary" id="btnNueva">+ Nueva Categoría</button>
      </div>

      <table id="catTable">
        <thead>
          <tr>
            <th>ID</th><th>Imagen</th><th>Nombre</th><th>Descripción</th><th>Acciones</th>
          </tr>
        </thead>
        <tbody id="catBody">
          <tr><td colspan="5">Cargando...</td></tr>
        </tbody>
      </table>
    </main>
  </div>

  <!-- Modal crear/editar -->
  <div class="overlay" id="modalOverlay">
    <div class="modal">
      <h3 id="modalTitle">Nueva Categoría</h3>
      <input type="hidden" id="editId" value="" />

      <div class="form-group">
        <label>Nombre *</label>
        <input type="text" id="inputNombre" placeholder="Ej: Hamburguesas" />
      </div>
      <div class="form-group">
        <label>Descripción</label>
        <textarea id="inputDesc" placeholder="Descripción opcional..."></textarea>
      </div>
      <div class="form-group">
        <label>URL de imagen</label>
        <input type="text" id="inputImg" placeholder="https://..." />
      </div>

      <p id="formError" style="color:#e53e3e;font-size:.83rem;display:none;margin:0 0 8px;"></p>

      <div class="modal-footer">
        <button class="btn-cancel" id="btnCancelar">Cancelar</button>
        <button class="btn-primary" id="btnGuardar">Guardar</button>
      </div>
    </div>
  </div>

  <script type="module" src="./categories.ts"></script>
</body>
</html>
