<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro | Food Store</title>
  <link rel="stylesheet" href="../../../css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <script src="https://kit.fontawesome.com/2223cc897f.js" crossorigin="anonymous"></script>
</head>
<body>
  <div class="bg-login"></div>

  <section class="login-main">
    <div class="login-card bg-blur">
      <h1 class="card-title montserrat">🍕 Food<b>Store</b> 🍕</h1>
      <h3 class="card-subtitle montserrat">Registro</h3>

      <form id="registroForm" class="login-form">
        <label class="label-email montserrat">Nombre</label>
        <div class="div-input montserrat">
          <i class="fa-solid fa-user"></i>
          <input id="inputNombre" name="nombre" type="text" required placeholder="Tu nombre" />
        </div>

        <label class="label-email montserrat">Apellido</label>
        <div class="div-input montserrat">
          <i class="fa-solid fa-user"></i>
          <input id="inputApellido" name="apellido" type="text" required placeholder="Tu apellido" />
        </div>

        <label class="label-email montserrat">Email</label>
        <div class="div-input montserrat">
          <i class="fa-solid fa-envelope"></i>
          <input id="inputEmail" name="email" type="email" required placeholder="correo@ejemplo.com" />
        </div>

        <label class="label-pass montserrat">Contraseña</label>
        <div class="div-input montserrat">
          <i class="fa-solid fa-unlock-keyhole"></i>
          <input id="inputPassword" name="password" type="password" required
            minlength="6" placeholder="Mínimo 6 caracteres" />
        </div>

        <p id="regError" style="color:#e53e3e;font-size:.88rem;margin:6px 0 0;display:none;"></p>

        <button type="submit" class="form-btn montserrat">Registrarse</button>

        <div class="create-account montserrat">
          ¿Ya tenés cuenta?
          <a href="../login/login.html">Iniciá sesión</a>
        </div>
      </form>
    </div>
  </section>

  <footer class="footer montserrat">
    <div class="footer-company">© 2026 Food Store. Todos los derechos reservados</div>
  </footer>

  <script type="module" src="./registro.ts"></script>
</body>
</html>
